---
# Productivity stack: Vaultwarden, Nextcloud
# Copy .env.example to .env and fill in your values before starting.

name: productivity

networks:
  proxy:
    external: true
  productivity:
    name: productivity
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Vaultwarden – self-hosted Bitwarden-compatible password manager
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - DOMAIN=https://vaultwarden.${DOMAIN}
      - SIGNUPS_ALLOWED=${VW_SIGNUPS_ALLOWED:-false}
      - ADMIN_TOKEN=${VW_ADMIN_TOKEN}
      - WEBSOCKET_ENABLED=true
    volumes:
      - ${APPDATA_DIR}/vaultwarden:/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=cloudflare"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      # WebSocket support for browser extension live sync
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`vaultwarden.${DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-ws.tls.certresolver=cloudflare"
      - "traefik.http.services.vaultwarden-ws.loadbalancer.server.port=3012"

  # ---------------------------------------------------------------------------
  # Nextcloud – self-hosted file storage and collaboration
  # ---------------------------------------------------------------------------
  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${NC_DB_NAME:-nextcloud}
      - POSTGRES_USER=${NC_DB_USER:-nextcloud}
      - POSTGRES_PASSWORD=${NC_DB_PASSWORD}
    volumes:
      - ${APPDATA_DIR}/nextcloud/db:/var/lib/postgresql/data
    networks:
      - productivity

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - productivity

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    environment:
      - TZ=${TZ}
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=${NC_DB_NAME:-nextcloud}
      - POSTGRES_USER=${NC_DB_USER:-nextcloud}
      - POSTGRES_PASSWORD=${NC_DB_PASSWORD}
      - REDIS_HOST=nextcloud-redis
      - NEXTCLOUD_ADMIN_USER=${NC_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NC_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${DOMAIN}
      - OVERWRITEPROTOCOL=https
    volumes:
      - ${APPDATA_DIR}/nextcloud/html:/var/www/html
      - ${NC_DATA_DIR}:/var/www/html/data
    networks:
      - proxy
      - productivity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAIN}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=cloudflare"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      # Nextcloud recommended redirect rules
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.permanent=true"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.regex=/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.replacement=/remote.php/dav/"
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-redirect"
