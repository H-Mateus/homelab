---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sources
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/sources
  prune: true
  wait: true
  timeout: 2m0s
  # The sources directory now also contains a SOPS-encrypted Secret used as
  # postBuild substitution input for the `infrastructure` Kustomization, so
  # this Kustomization needs to be able to decrypt.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
