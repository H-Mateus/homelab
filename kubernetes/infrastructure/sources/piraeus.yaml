---
# piraeus-charts packages the official kubernetes-csi/external-snapshotter
# as a Helm chart. This is the standard community approach for installing
# the VolumeSnapshot CRDs and snapshot-controller via Helm.
# https://piraeus.io/helm-charts/
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: piraeus
  namespace: flux-system
spec:
  interval: 24h
  url: https://piraeus.io/helm-charts/
