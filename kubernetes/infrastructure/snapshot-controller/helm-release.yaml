---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller
spec:
  interval: 30m
  chart:
    spec:
      # piraeus-charts packages the official kubernetes-csi/external-snapshotter.
      # The chart installs the VolumeSnapshot CRDs and the snapshot-controller
      # Deployment into the snapshot-controller namespace.
      chart: snapshot-controller
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: piraeus
        namespace: flux-system
      interval: 24h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    replicaCount: 1
