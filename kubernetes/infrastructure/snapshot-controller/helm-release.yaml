---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: snapshot-controller
spec:
  interval: 30m
  chart:
    spec:
      # Provided by the democratic-csi HelmRepository — no extra source needed.
      chart: snapshot-controller
      version: ">=3.0.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
      interval: 24h
  install:
    # CRDs must be created first — VolumeSnapshot, VolumeSnapshotClass,
    # and VolumeSnapshotContent — before any other component (including
    # democratic-csi) tries to create objects of those types.
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    replicaCount: 1
