apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Order matters: snapshot-controller must be applied before democratic-csi
  # so the VolumeSnapshot CRDs exist when democratic-csi creates its
  # VolumeSnapshotClass. The HelmRelease-level dependsOn below enforces
  # this at the helm-controller level as well.
  - snapshot-controller
  - democratic-csi
