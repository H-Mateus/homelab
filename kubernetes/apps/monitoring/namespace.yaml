---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
    # node-exporter requires privileged PSA: it uses hostNetwork, hostPID,
    # and hostPath volumes to scrape kernel/hardware metrics from each node.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
