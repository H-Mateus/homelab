repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, relaxed]

  # Ensure SOPS-managed secret files are encrypted before they reach git.
  # An unencrypted *.sops.yaml file lacks the 'sops:' block that SOPS adds;
  # this hook catches that case deterministically.  gitleaks is a complementary
  # catch-all for other secret patterns but is not SOPS-aware.
  - repo: local
    hooks:
      - id: check-sops-encrypted
        name: Verify *.sops.yaml files are SOPS-encrypted
        language: script
        entry: scripts/check-sops-encrypted.sh
        files: \.sops\.yaml$
        types: [file]
