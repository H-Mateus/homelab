#
# Immich stack, exposed only via Tailscale as a dedicated device.
#
# Upstream reference: https://docs.immich.app/install/docker-compose
# Pin the docker-compose.yml against the release that matches the image tag
# you're running:
#   https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# Architecture
# ------------
# All Immich services (server, ml, postgres, redis) communicate over the
# default Compose network using service names. The Tailscale sidecar is also
# on that network and uses `tailscale serve` (HTTPS termination via MagicDNS
# cert) to proxy https://<host>.<tailnet>.ts.net to immich-server:2283.
#
# We deliberately do NOT use `network_mode: service:immich-family-ts` on
# immich-server, because that would put immich-server into the sidecar's
# network namespace and break DNS resolution of `database` and `redis`.
# Instead, the sidecar lives on the Compose network and reaches the server
# by container name. The server is therefore NOT exposed on the host LAN at
# all (no `ports:`), which is what we want: access is Tailnet-only.
#
# Postgres version
# ----------------
# The image tag MUST match the version that wrote the data on disk. Right
# now this stack inherits an existing pgData dir from the TrueNAS Immich app,
# which runs `postgres:18-vectorchord0.5.3`. Do NOT change this tag without
# either pg_upgrade or a dump/restore.

name: immich

configs:
  immich-family-ts-serve:
    # Proxies https://<host>.<tailnet>.ts.net (port 443, HTTPS) to the
    # immich-server container on its native port 2283. Resolved via Docker's
    # embedded DNS using the Compose service name.
    content: |
      { "TCP": { "443": { "HTTPS": true } },
        "Web": { "$${TS_CERT_DOMAIN}:443": { "Handlers": { "/": { "Proxy": "http://immich-server:2283" } } } },
        "AllowFunnel": { "$${TS_CERT_DOMAIN}:443": false } }

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # No `ports:` — access is Tailnet-only via the tailscale sidecar.
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    # Diverges from the upstream template's `env_file: - .env`: Dockhand injects
    # stack env for interpolation but writes no physical .env, so an explicit
    # env_file errors ("env file ... not found"). Pass the vars immich-server
    # needs via environment: interpolation instead. DB_HOSTNAME / REDIS_HOSTNAME
    # are the Compose service names.
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: redis
      TZ: ${TZ:-Etc/UTC}
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    # See immich-server: env_file replaced with environment: for Dockhand.
    environment:
      TZ: ${TZ:-Etc/UTC}
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    # MUST match the Postgres version that wrote the data on disk. The TrueNAS
    # Immich app is currently on postgres:18-vectorchord0.5.3 — keep this in
    # sync, or run pg_upgrade / dump-restore before changing it.
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # NOTE: Postgres 18+ images changed the data layout. They expect a single
      # mount at /var/lib/postgresql and store cluster files in a major-version
      # subdirectory like /var/lib/postgresql/18/. The upstream Immich compose
      # template still uses the old PG14 path (/var/lib/postgresql/data) — do
      # NOT copy that verbatim for this stack. Our DB_DATA_LOCATION dir already
      # contains the new layout (inherited from the TrueNAS Immich app, which
      # ran pg_upgrade 15→18 at some point).
      # See https://github.com/docker-library/postgres/pull/1259
      - ${DB_DATA_LOCATION}:/var/lib/postgresql
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

  immich-family-ts:
    container_name: immich-family-ts
    image: tailscale/tailscale:latest
    hostname: immich-family
    environment:
      - "TS_AUTHKEY=${TS_AUTHKEY}"
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
    volumes:
      - ./ts-state/immich-family:/var/lib/tailscale
    configs:
      - source: immich-family-ts-serve
        target: /config/serve.json
    depends_on:
      - immich-server
    restart: always

volumes:
  model-cache:
