services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    volumes:
      - ./configs/radarr/:/config
      - ${MEDIA_PATH}:/media # Use the MEDIA_PATH variable
    ports:
      - 7878:7878
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    volumes:
      - ./configs/sonarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 8989:8989
    restart: unless-stopped
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/London
      - PORT=5055
    ports:
      - 5055:5055
    volumes:
      - ./configs/seerr/:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status
        || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    # Current GPU too old, not supported
    #runtime: nvidia
    container_name: jellyfin
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    # - NVIDIA_VISIBLE_DEVICES=all
    # - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - ./configs/jellyfin:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 8096:8096
    restart: unless-stopped
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    volumes:
      - ./configs/lidarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 8686:8686
    restart: unless-stopped
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    volumes:
      - ./configs/bazarr/:/config
      - ${MEDIA_PATH}:/media
    ports:
      - 6767:6767
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=568
      - PGID=568
      - TZ=Europe/London
    volumes:
      - ./configs/prowlarr/:/config
      - ${MEDIA_PATH}:/media/
    ports:
      - 9696:9696
    restart: unless-stopped
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
      - TZ=Europe/London
    ports:
      - 8191:8191
    restart: unless-stopped
  qbittorrent:
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent
    restart: unless-stopped
    ports:
      - 8080:8080
      - 8118:8118 # ADD Privoxy Port
    environment:
      - PUID=568
      - PGID=568
      - UMASK=002
      - TZ=Europe/London
      - WEBUI_PORTS=8080/tcp,8080/udp
      - VPN_ENABLED=true
      - VPN_CONF=wg0
      - VPN_PROVIDER=proton
      - VPN_LAN_NETWORK=${LAN_IP_RANGE}
      - VPN_LAN_LEAK_ENABLED=false
      - VPN_EXPOSE_PORTS_ON_LAN=
      - VPN_AUTO_PORT_FORWARD=true
      - VPN_AUTO_PORT_FORWARD_TO_PORTS=
      - VPN_FIREWALL_TYPE=auto
      - VPN_HEALTHCHECK_ENABLED=false
      - VPN_NAMESERVERS=
      # Enable PRIVOXY for prowlarr to leverage VPN
      - PRIVOXY_ENABLED=true
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    volumes:
      - ./configs/qbit/:/config
      - ${MEDIA_PATH}:/media
networks: {}
