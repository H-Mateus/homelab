configs:
  immichframe-family-ts-serve:
    content: |
      { "TCP": { "443": { "HTTPS": true } },
        "Web": { "$${TS_CERT_DOMAIN}:443": { "Handlers": { "/": { "Proxy": "http://127.0.0.1:8080" } } } },
        "AllowFunnel": { "$${TS_CERT_DOMAIN}:443": false } }
services:
  immichframe-family:
    container_name: immichframe-family
    image: ghcr.io/immichframe/immichframe:latest
    network_mode: service:immichframe-family-ts
    environment:
      - TZ=Europe/London
      - "ImmichServerUrl=${IMMICH_URL}"
      - "ApiKey=${IMMICH_API_KEY}"
      - "Albums=470366b8-1617-413d-b349-4d88c85554a8"
      - "PrimaryColor=#FFFFFF"
      - "ClockFormat=HH:mm"
      - PhotoDateFormat=yyyy-MM-dd
      - ShowAlbumName=false
      - ShowPeopleDesc=false
      - ShowWeatherDescription=true
      - "WeatherApiKey=${WEATHER_API_KEY}"
      - "WeatherLatLong=51.5074,-0.1278"
      - "UnitSystem=metric" # 'imperial' | 'metric'
      # Interval in hours. Determines how often images are pulled from a album/person in immich.
      - RefreshAlbumPeopleInterval=1
    depends_on:
      - immichframe-family-ts
    restart: unless-stopped
  immichframe-family-ts:
    container_name: immichframe-family-ts
    image: tailscale/tailscale:latest
    hostname: immichframe-family
    environment:
      - "TS_AUTHKEY=${TS_AUTHKEY}"
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
    volumes:
      - "/mnt/data/photos/immich/immichframe/family-ts:/var/lib/tailscale"
    configs:
      - source: immichframe-family-ts-serve
        target: /config/serve.json
    restart: unless-stopped
