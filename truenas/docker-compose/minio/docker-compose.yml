#
# MinIO object storage, exposed only via Tailscale as a dedicated device.
#
# Purpose: backend for OpenTofu remote state (see opentofu/live/homelab/
# backend.tf). MinIO is S3-compatible and supports the `use_lockfile`
# S3-native locking that recent Tofu/Terraform expose, so we don't need a
# DynamoDB-compatible side service for state locking.
#
# Architecture
# ------------
# MinIO and the Tailscale sidecar share the default Compose network.
# Tailscale runs in userspace mode with `tailscale serve` terminating HTTPS
# at https://<host>.<tailnet>.ts.net (port 443) and proxying everything to
# minio:9000 (S3 API). The MinIO console (9001) is not exposed by default
# — use `mc` from any tailnet device for admin.
#
# No `ports:` on the host: the MinIO API is unreachable from LAN, only via
# Tailnet. This mirrors the Immich + ImmichFrame pattern in this repo.
#
# First-time bootstrap
# --------------------
# 1. Copy .env.example to .env and fill in MINIO_ROOT_*, TS_AUTHKEY, and
#    the storage path (default /mnt/HDDs/minio/data).
# 2. Pre-create the storage dir and chown to 568:568.
# 3. `docker compose up -d` — the Tailscale sidecar will join the tailnet
#    using TS_AUTHKEY and register the MagicDNS name `minio`.
# 4. From any tailnet client, create the bucket and a non-root user for
#    OpenTofu:
#       mc alias set homelab https://minio.<tailnet>.ts.net <root> <pw>
#       mc mb homelab/tofu-state
#       mc admin user add homelab tofu <generated-secret>
#       mc admin policy attach homelab readwrite --user tofu
#    Use the `tofu` user's access/secret keys in opentofu's environment
#    (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) — root keys are emergency
#    only.

name: minio

configs:
  minio-ts-serve:
    # Terminate HTTPS at the MagicDNS name and proxy everything to MinIO's
    # S3 API. Path-style URLs work out of the box (use_path_style=true on
    # the Tofu side).
    content: |
      { "TCP": { "443": { "HTTPS": true } },
        "Web": { "$${TS_CERT_DOMAIN}:443": { "Handlers": { "/": { "Proxy": "http://minio:9000" } } } },
        "AllowFunnel": { "$${TS_CERT_DOMAIN}:443": false } }

services:
  minio:
    container_name: minio
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    user: "568:568"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Force MinIO to advertise its public URL so pre-signed URLs (and
      # the console) point at the Tailnet hostname, not the container IP.
      MINIO_SERVER_URL: https://minio.${TS_TAILNET}.ts.net
      MINIO_BROWSER_REDIRECT_URL: https://minio.${TS_TAILNET}.ts.net/console
    volumes:
      - ${MINIO_DATA_DIR}:/data
    # No `ports:` — Tailnet-only. (The console at :9001 is reachable from
    # other containers on the Compose network; expose it via a second
    # tailscale serve entry if you want browser admin.)
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-ts:
    container_name: minio-ts
    image: tailscale/tailscale:latest
    hostname: minio
    environment:
      - "TS_AUTHKEY=${TS_AUTHKEY}"
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
      # Tag distinguishes this device from k8s-node and operator devices in
      # ACLs. Add `tag:minio` to your Tailscale ACL policy.
      - TS_EXTRA_ARGS=--advertise-tags=tag:minio
    volumes:
      - ${MINIO_TS_STATE_DIR}:/var/lib/tailscale
    configs:
      - source: minio-ts-serve
        target: /config/serve.json
    depends_on:
      - minio
    restart: always
